name: Sync main branch

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push master to main
        run: git push origin HEAD:main --force-with-lease
