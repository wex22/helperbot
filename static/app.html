<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WEX MIND</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:var(--tg-theme-bg-color,#17212b);
  --bg2:var(--tg-theme-secondary-bg-color,#1c2733);
  --card:#242f3d;--card2:#2b3a4a;
  --text:var(--tg-theme-text-color,#fff);
  --sub:var(--tg-theme-hint-color,#8d9ba8);
  --link:var(--tg-theme-link-color,#4c9bf7);
  --accent:var(--tg-theme-button-color,#4c9bf7);
  --accent-t:var(--tg-theme-button-text-color,#fff);
  --urgent:#ff453a;--normal:#ffd60a;--someday:#98a2b3;
  --green:#30d158;--red:#ff453a;--orange:#ff9f0a;--purple:#bf5af2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;padding-bottom:110px}

/* Header */
.hdr{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.hdr-l h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.hdr-l p{color:var(--sub);font-size:12px;margin-top:2px}
.hdr-r{display:flex;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.icon-btn:active{transform:scale(.88)}

/* Search */
.srch-wrap{padding:0 16px 6px;display:none}
.srch{width:100%;background:var(--card);border:none;border-radius:12px;padding:9px 14px;color:var(--text);font-size:14px;outline:none}
.srch::placeholder{color:var(--sub)}

/* Tabs */
.tabs{display:flex;padding:4px 12px 6px;gap:5px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;border-radius:18px;border:none;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--sub);display:flex;align-items:center;gap:4px;transition:all .15s}
.tab.active{background:var(--accent);color:var(--accent-t)}
.bn{background:rgba(255,255,255,.18);padding:1px 5px;border-radius:8px;font-size:10px}

/* Subfilters */
.subf{display:flex;padding:0 14px 6px;gap:5px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:12px;border:1px solid transparent;font-size:11px;cursor:pointer;background:transparent;color:var(--sub)}
.chip.on{background:var(--card);color:var(--text);border-color:rgba(255,255,255,.07)}
.tag-chips{display:flex;padding:0 14px 6px;gap:5px;overflow-x:auto;scrollbar-width:none;display:none}
.tag-chips::-webkit-scrollbar{display:none}
.tag-chip{padding:3px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--sub);font-size:11px;cursor:pointer;white-space:nowrap}
.tag-chip.on{background:rgba(76,155,247,.2);color:var(--link);border-color:var(--link)}

/* List */
.list{padding:2px 14px}
.day-h{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 5px;font-weight:600}

/* Card */
.card{background:var(--card);border-radius:13px;margin-bottom:7px;position:relative;overflow:hidden;transition:transform .25s,opacity .25s,max-height .25s}
.card.removing{transform:translateX(120%);opacity:0;max-height:0;margin:0}
.card-inner{display:flex;gap:8px;align-items:flex-start;padding:12px 12px 12px 13px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.dot.urgent{background:var(--urgent);box-shadow:0 0 8px rgba(255,69,58,.5)}
.dot.normal{background:var(--normal)}
.dot.someday{background:var(--someday)}
.cbody{flex:1;min-width:0;cursor:pointer}
.ctitle{font-size:14px;line-height:1.35;word-break:break-word}
.cmeta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.badge{padding:2px 7px;border-radius:7px;font-size:10px;font-weight:500;display:inline-flex;align-items:center;gap:2px;cursor:pointer}
.bc-task{background:rgba(76,155,247,.18);color:#4c9bf7}
.bc-reminder{background:rgba(255,159,10,.18);color:var(--orange)}
.bc-idea{background:rgba(191,90,242,.18);color:var(--purple)}
.bc-thought{background:rgba(141,155,168,.18);color:var(--sub)}
.bc-note{background:rgba(48,209,88,.15);color:var(--green)}
.bc-habit{background:rgba(191,90,242,.18);color:var(--purple)}
.bt{background:rgba(255,159,10,.16);color:var(--orange);font-weight:600}
.br{background:rgba(191,90,242,.16);color:var(--purple)}
.ba{background:rgba(141,155,168,.10);color:var(--sub)}
.bd{background:rgba(255,69,58,.18);color:var(--red);font-weight:600}
.btag{background:rgba(76,155,247,.10);color:var(--link)}

/* Swipe bg */
.swipe-left-bg,.swipe-right-bg{position:absolute;inset:0;display:flex;align-items:center;padding:0 20px;opacity:0;transition:opacity .15s;pointer-events:none}
.swipe-left-bg{background:rgba(48,209,88,.25);justify-content:flex-start;color:var(--green);font-size:20px}
.swipe-right-bg{background:rgba(255,69,58,.25);justify-content:flex-end;color:var(--red);font-size:20px}

.cactions{display:flex;flex-direction:column;gap:5px}
.btn-i{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:transform .1s;padding:0}
.btn-i:active{transform:scale(.85)}
.bi-check{background:rgba(48,209,88,.18);color:var(--green)}
.bi-edit{background:rgba(76,155,247,.18);color:var(--link)}

/* Expand panel */
.cexpand{width:100%;padding:10px 13px 12px;border-top:1px solid rgba(255,255,255,.07);display:none;flex-direction:column;gap:7px}
.card.expanded .cexpand{display:flex}
.cexpand textarea{width:100%;background:var(--bg);border:none;border-radius:10px;padding:9px 11px;color:var(--text);font-size:13px;resize:none;outline:none;min-height:56px;font-family:inherit}
.mchips{display:flex;gap:5px;flex-wrap:wrap}
.mc{padding:4px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:var(--bg);color:var(--sub);font-size:11px;cursor:pointer}
.mc.on{background:var(--accent);color:var(--accent-t);border-color:transparent}
.exp-actions{display:flex;gap:6px;justify-content:flex-end}
.btn-sm{padding:6px 13px;border-radius:8px;border:none;font-size:12px;font-weight:500;cursor:pointer}
.btn-p{background:var(--accent);color:var(--accent-t)}
.btn-s{background:var(--card2);color:var(--text)}

/* Snooze */
.snooze-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.snbtn{padding:4px 9px;border-radius:9px;border:none;background:rgba(255,159,10,.14);color:var(--orange);font-size:11px;cursor:pointer;font-weight:500}
.snbtn:active{transform:scale(.93)}

/* Due badge */
.due-ok{background:rgba(255,159,10,.18);color:var(--orange)}
.due-over{background:rgba(255,69,58,.2);color:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Stats tab */
.stats-wrap{padding:12px 14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:12px;padding:14px 14px 12px;display:flex;flex-direction:column;gap:4px}
.stat-num{font-size:26px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--sub)}
.stat-bar-wrap{background:var(--card);border-radius:12px;padding:14px}
.stat-bar-title{font-size:12px;color:var(--sub);margin-bottom:10px}
.sbar{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.sbar-lbl{font-size:12px;width:80px;flex-shrink:0}
.sbar-track{flex:1;background:rgba(255,255,255,.08);border-radius:6px;height:6px;overflow:hidden}
.sbar-fill{height:100%;border-radius:6px;transition:width .4s}
.sbar-num{font-size:11px;color:var(--sub);width:24px;text-align:right}
.habits-wrap{background:var(--card);border-radius:12px;padding:14px;margin-top:8px}
.habit-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.habit-row:last-child{border:none}
.habit-name{font-size:13px}
.habit-streak{font-size:12px;color:var(--orange)}
.habit-btn{padding:5px 12px;border-radius:9px;border:none;background:rgba(48,209,88,.18);color:var(--green);font-size:12px;cursor:pointer}

/* Quick-add bar */
.qabar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid rgba(255,255,255,.06);padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:90;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.qa-input{flex:1;background:var(--bg);border:none;border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;outline:none}
.qa-input::placeholder{color:var(--sub)}
.qa-send{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;color:var(--accent-t);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-send:active{transform:scale(.9)}
.qa-expand-btn{width:36px;height:36px;border-radius:50%;background:var(--card2);border:none;color:var(--sub);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* FAB (hidden when quick-add focused) */
.fab{position:fixed;bottom:72px;right:16px;width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;color:var(--accent-t);font-size:26px;cursor:pointer;box-shadow:0 6px 18px rgba(76,155,247,.4);display:none;align-items:center;justify-content:center;z-index:95}
.fab:active{transform:scale(.92)}

/* Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:22px 22px 0 0;padding:12px 16px 28px;z-index:300;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.sheet.show{transform:translateY(0)}
.handle{width:38px;height:4px;background:var(--sub);border-radius:2px;margin:0 auto 14px;opacity:.4}
.sh-title{font-size:16px;font-weight:700;margin-bottom:13px}
.field{width:100%;background:var(--bg);border:none;border-radius:12px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;font-family:inherit;margin-bottom:9px}
textarea.field{min-height:76px;resize:none}
.lbl{font-size:11px;color:var(--sub);margin:5px 0 5px 3px}
.cat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:11px}
.cat-btn{padding:8px 3px;border-radius:9px;border:1px solid rgba(255,255,255,.06);background:var(--bg);color:var(--sub);font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.cat-btn .em{font-size:16px}
.cat-btn.on{background:var(--accent);color:var(--accent-t);border-color:transparent}
.pri-row{display:flex;gap:5px;margin-bottom:11px}
.pri-btn{flex:1;padding:8px;border-radius:9px;border:1px solid rgba(255,255,255,.06);background:var(--bg);color:var(--sub);font-size:11px;cursor:pointer}
.pri-btn.on.urgent{background:rgba(255,69,58,.2);color:var(--urgent);border-color:var(--urgent)}
.pri-btn.on.normal{background:rgba(255,214,10,.2);color:var(--normal);border-color:var(--normal)}
.pri-btn.on.someday{background:rgba(152,162,179,.2);color:var(--text);border-color:var(--someday)}
.time-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.tq{padding:6px 11px;border-radius:9px;background:var(--bg);border:1px solid rgba(255,255,255,.06);color:var(--sub);font-size:11px;cursor:pointer}
.tq.on{background:var(--accent);color:var(--accent-t);border-color:transparent}
.dt-input{width:100%;background:var(--bg);border:none;border-radius:9px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;margin-bottom:9px;color-scheme:dark}
.due-row{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap}
.dq{padding:6px 11px;border-radius:9px;background:var(--bg);border:1px solid rgba(255,255,255,.06);color:var(--sub);font-size:11px;cursor:pointer}
.dq.on{background:rgba(255,159,10,.2);color:var(--orange);border-color:var(--orange)}
.btn-add{width:100%;padding:13px;background:var(--accent);color:var(--accent-t);border:none;border-radius:13px;font-size:15px;font-weight:600;cursor:pointer}
.btn-add:active{opacity:.8}

/* Empty / loader */
.empty{text-align:center;padding:50px 24px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{color:var(--sub);font-size:15px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;justify-content:center;padding:50px}

/* Toast */
.toast{position:fixed;top:10px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(48,209,88,.92);color:#fff;padding:8px 16px;border-radius:16px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:rgba(255,69,58,.92)}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-l">
    <h1>WEX MIND</h1>
    <p id="hdr-sub">Загрузка…</p>
  </div>
  <div class="hdr-r">
    <button class="icon-btn" onclick="toggleSearch()">🔍</button>
    <button class="icon-btn" onclick="reload()">↻</button>
  </div>
</div>

<!-- Search -->
<div class="srch-wrap" id="srch-wrap">
  <input class="srch" id="srch" placeholder="Поиск…" oninput="onSearch()">
</div>

<!-- Tabs -->
<div class="tabs" id="tabs"></div>

<!-- Subfilter (priority) -->
<div class="subf" id="subf" style="display:none">
  <button class="chip on" onclick="setPri('all',this)">Все</button>
  <button class="chip"    onclick="setPri('urgent',this)">🔴 Срочно</button>
  <button class="chip"    onclick="setPri('normal',this)">🟡 Обычно</button>
  <button class="chip"    onclick="setPri('someday',this)">⚪ Потом</button>
</div>

<!-- Tag chips -->
<div class="tag-chips" id="tag-chips"></div>

<!-- List -->
<div class="list" id="list"></div>

<!-- Quick-add bar -->
<div class="qabar">
  <button class="qa-expand-btn" onclick="openSheet()">⊕</button>
  <input class="qa-input" id="qa-inp" placeholder="Быстро добавить задачу…" onkeydown="qaKey(event)">
  <button class="qa-send" onclick="qaSend()">↑</button>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div class="sh-title">Добавить запись</div>

  <div class="lbl">Тип</div>
  <div class="cat-grid" id="cat-grid">
    <button class="cat-btn on" data-c="task"     onclick="selCat('task',this)"><span class="em">📋</span>Задача</button>
    <button class="cat-btn"    data-c="reminder" onclick="selCat('reminder',this)"><span class="em">⏰</span>Напом.</button>
    <button class="cat-btn"    data-c="idea"     onclick="selCat('idea',this)"><span class="em">💡</span>Идея</button>
    <button class="cat-btn"    data-c="thought"  onclick="selCat('thought',this)"><span class="em">💭</span>Мысль</button>
    <button class="cat-btn"    data-c="note"     onclick="selCat('note',this)"><span class="em">📝</span>Заметка</button>
    <button class="cat-btn"    data-c="habit"    onclick="selCat('habit',this)"><span class="em">🔁</span>Привычка</button>
  </div>

  <textarea class="field" id="sh-content" placeholder="Текст…"></textarea>

  <div class="lbl">Приоритет</div>
  <div class="pri-row">
    <button class="pri-btn urgent"        onclick="selPri('urgent',this)">🔴 Срочно</button>
    <button class="pri-btn normal on"     onclick="selPri('normal',this)">🟡 Обычно</button>
    <button class="pri-btn someday"       onclick="selPri('someday',this)">⚪ Потом</button>
  </div>

  <div id="time-block" style="display:none">
    <div class="lbl">Когда напомнить</div>
    <div class="time-row">
      <button class="tq" onclick="selTime(60,this)">+1ч</button>
      <button class="tq" onclick="selTime(180,this)">+3ч</button>
      <button class="tq" onclick="selTime('t9',this)">Сегодня 9:00</button>
      <button class="tq" onclick="selTime('d9',this)">Завтра 9:00</button>
      <button class="tq" onclick="selTime('custom',this)">📅 Точно</button>
    </div>
    <input type="datetime-local" class="dt-input" id="sh-dt" style="display:none">
  </div>

  <div id="due-block" style="display:none">
    <div class="lbl">Дедлайн (до когда)</div>
    <div class="due-row">
      <button class="dq" onclick="selDue('today',this)">Сегодня</button>
      <button class="dq" onclick="selDue('tomorrow',this)">Завтра</button>
      <button class="dq" onclick="selDue('week',this)">Через неделю</button>
      <button class="dq" onclick="selDue('custom',this)">📅 Точно</button>
    </div>
    <input type="date" class="dt-input" id="sh-due" style="display:none">
  </div>

  <button class="btn-add" id="sh-save" onclick="saveEntry()">Сохранить</button>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN='__TOKEN__', BASE='__BASE_URL__';
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor?.('secondary_bg_color')}

const CAT={
  task:{e:'📋',l:'Задачи'},reminder:{e:'⏰',l:'Напомин.'},
  idea:{e:'💡',l:'Идеи'},thought:{e:'💭',l:'Мысли'},
  note:{e:'📝',l:'Заметки'},habit:{e:'🔁',l:'Привычки'},
};
const TABS=[
  {k:'all',l:'Все',e:'•'},{k:'task',l:'Задачи',e:'📋'},
  {k:'reminder',l:'Напомин.',e:'⏰'},{k:'idea',l:'Идеи',e:'💡'},
  {k:'note',l:'Заметки',e:'📝'},{k:'thought',l:'Мысли',e:'💭'},
  {k:'habit',l:'Привычки',e:'🔁'},{k:'done',l:'Готово',e:'✅'},
  {k:'stats',l:'Стат.',e:'📊'},
];
let entries=[],reminders=[],rByEntry={},stats=null;
let tab='all',pri='all',search='',filterTag=null,expandedId=null;
let shCat='task',shPri='normal',shTime=null,shDue=null;

// ── Tabs ──────────────────────────────────────────────────────────
function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>{
    const n=countTab(t.k);
    return`<button class="tab ${tab===t.k?'active':''}" onclick="setTab('${t.k}',this)">${t.e} ${t.l}${n?`<span class="bn">${n}</span>`:''}</button>`;
  }).join('');
}
function countTab(k){
  if(!stats)return 0;
  if(k==='all')return stats.open_total||0;
  if(k==='done')return stats.done_tasks||0;
  if(k==='stats')return '';
  return stats.by_open?.[k]||0;
}
function setTab(t,el){
  tab=t;expandedId=null;filterTag=null;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el?.classList.add('active');
  const showSub=t==='task'||t==='all';
  document.getElementById('subf').style.display=showSub?'flex':'none';
  if(t==='stats'){renderStats();return}
  load();
}
function setPri(p,el){
  pri=p;
  document.querySelectorAll('#subf .chip').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}

// ── Tag filter ────────────────────────────────────────────────────
function buildTagChips(){
  const allTags=new Set();
  entries.forEach(e=>(e.tags||[]).forEach(t=>allTags.add(t)));
  const tc=document.getElementById('tag-chips');
  if(!allTags.size){tc.style.display='none';return}
  tc.style.display='flex';
  tc.innerHTML=[...allTags].slice(0,15).map(t=>
    `<button class="tag-chip ${filterTag===t?'on':''}" onclick="setTagFilter('${esc(t)}')">#${esc(t)}</button>`
  ).join('');
}
function setTagFilter(t){
  filterTag=filterTag===t?null:t;
  buildTagChips();render();
}

// ── Search ────────────────────────────────────────────────────────
function toggleSearch(){
  const w=document.getElementById('srch-wrap');
  if(w.style.display==='none'||!w.style.display){
    w.style.display='block';
    setTimeout(()=>document.getElementById('srch').focus(),50);
  }else{
    w.style.display='none';
    document.getElementById('srch').value='';
    if(search){search='';load();}
  }
}
let _st;
function onSearch(){clearTimeout(_st);_st=setTimeout(()=>{search=document.getElementById('srch').value.trim();load();},280)}

// ── Load ──────────────────────────────────────────────────────────
async function reload(){tg?.HapticFeedback?.impactOccurred('light');await load();}

async function load(){
  if(tab==='stats'){await loadStats();return}
  document.getElementById('list').innerHTML='<div class="loading-wrap"><div class="spin"></div></div>';
  try{
    const status=tab==='done'?'done':'open';
    const cat=(tab==='all'||tab==='done')?'':tab;
    const q=search||'';
    const [eRes,rRes,sRes]=await Promise.all([
      api(`/api/entries?status=${status}${cat?`&category=${cat}`:''}${q?`&q=${enc(q)}`:''}`),
      api('/api/reminders'),
      api('/api/stats'),
    ]);
    entries=Array.isArray(eRes)?eRes:[];
    reminders=Array.isArray(rRes)?rRes:[];
    rByEntry={};
    reminders.forEach(r=>{rByEntry[r.entry_id]=r});

    // Compute open counts per category
    let openAll=entries;
    if(tab==='done'||cat){
      // need full open list for counts — fetch lightweight
      const all=await api('/api/entries?status=open&limit=500').catch(()=>[]);
      const by_open={},uo={};
      (all||[]).forEach(e=>{by_open[e.category]=(by_open[e.category]||0)+1;if(e.priority==='urgent')uo[e.id]=1});
      stats={...(sRes||{}),by_open,open_total:(all||[]).length,urgent_open:Object.keys(uo).length};
    }else{
      const by_open={};let urgent_open=0;
      entries.forEach(e=>{by_open[e.category]=(by_open[e.category]||0)+1;if(e.priority==='urgent')urgent_open++});
      stats={...(sRes||{}),by_open,open_total:entries.length,urgent_open};
    }
    renderTabs();renderHeader();buildTagChips();render();
  }catch(e){console.error(e);showToast('Ошибка загрузки',1);document.getElementById('list').innerHTML='';}
}

function renderHeader(){
  const s=document.getElementById('hdr-sub');
  if(!stats){s.textContent='…';return}
  const p=[];
  p.push(`${stats.open_total||0} открыто`);
  if(stats.urgent_open>0)p.push(`🔴 ${stats.urgent_open} срочных`);
  if(reminders.length>0)p.push(`⏰ ${reminders.length}`);
  s.textContent=p.join(' · ');
}

// ── Render list ───────────────────────────────────────────────────
function fmtTime(iso){
  if(!iso)return'';
  const d=new Date(iso),now=new Date();
  const same=d.toDateString()===now.toDateString();
  const tom=new Date(now);tom.setDate(tom.getDate()+1);
  const istom=d.toDateString()===tom.toDateString();
  const hm=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if(same)return hm;
  if(istom)return`завтра ${hm}`;
  return`${pad(d.getDate())}.${pad(d.getMonth()+1)} ${hm}`;
}
function fmtDue(iso){
  if(!iso)return{txt:'',over:false};
  const d=new Date(iso),now=new Date();
  const diff=Math.floor((d-now)/86400000);
  const over=diff<0;
  if(over)return{txt:`просрочено`,over:true};
  if(diff===0)return{txt:'сегодня',over:false};
  if(diff===1)return{txt:'завтра',over:false};
  return{txt:`${pad(d.getDate())}.${pad(d.getMonth()+1)}`,over:false};
}
function ageLabel(iso){
  if(!iso)return'';
  const d=new Date(iso),now=new Date();
  const days=Math.floor((now-d)/86400000);
  if(days<=0)return'сегодня';if(days===1)return'вчера';
  if(days<7)return`${days}д`;if(days<30)return`${Math.floor(days/7)}нед`;
  return`${Math.floor(days/30)}мес`;
}
function dayKey(iso){
  if(!iso)return'давно';
  const d=new Date(iso),now=new Date();
  const diff=Math.floor((new Date(d.getFullYear(),d.getMonth(),d.getDate())-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000);
  if(diff<-6)return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});
  if(diff<-1)return ageLabel(iso);
  if(diff===-1)return'вчера';if(diff===0)return'сегодня';
  if(diff===1)return'завтра';if(diff<7)return'на этой неделе';
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'});
}

function render(){
  const list=document.getElementById('list');
  let items=entries.slice();
  if(pri!=='all'&&(tab==='task'||tab==='all'))items=items.filter(e=>e.priority===pri);
  if(filterTag)items=items.filter(e=>(e.tags||[]).includes(filterTag));

  if(!items.length){
    const emo=tab==='done'?'✅':search?'🔍':'✨';
    const msg=search?`Ничего по «${search}»`:tab==='done'?'Ничего закрытого':tab==='reminder'?'Напоминаний нет':'Пусто — добавь запись';
    list.innerHTML=`<div class="empty"><div class="empty-icon">${emo}</div><p>${msg}</p></div>`;
    return;
  }

  if(tab==='reminder'){
    items.sort((a,b)=>{const ra=rByEntry[a.id],rb=rByEntry[b.id];return(ra?.remind_at||'9999').localeCompare(rb?.remind_at||'9999');});
  }

  const groups={},order=[];
  items.forEach(e=>{
    let k;
    if(tab==='reminder'){
      const r=rByEntry[e.id];
      k=r?(r.recurrence?'🔁 повторяющиеся':dayKey(r.remind_at)):'без времени';
    }else k=dayKey(e.created_at);
    if(!(k in groups)){groups[k]=[];order.push(k);}
    groups[k].push(e);
  });

  list.innerHTML=order.map(k=>`<div class="day-h">${k}</div>${groups[k].map(renderCard).join('')}`).join('');
  initSwipe();
}

function renderCard(e){
  const exp=expandedId===e.id;
  const rem=rByEntry[e.id];
  const cat=CAT[e.category]||{e:'•'};
  const catB=`<span class="badge bc-${e.category}">${cat.e} ${e.category}</span>`;

  let timeB='',recurB='';
  if(rem){
    if(rem.recurrence)recurB=`<span class="badge br">🔁 ${esc(rem.recurrence)}</span>`;
    else if(rem.remind_at)timeB=`<span class="badge bt">⏰ ${fmtTime(rem.remind_at)}</span>`;
  }

  let dueB='';
  if(e.due_date){
    const{txt,over}=fmtDue(e.due_date);
    dueB=`<span class="badge ${over?'due-over':'due-ok'}">📅 ${txt}</span>`;
  }

  const ageB=`<span class="badge ba">${ageLabel(e.created_at)}</span>`;
  const tagBs=(e.tags||[]).slice(0,3).map(t=>`<span class="badge btag" onclick="event.stopPropagation();setTagFilter('${esc(t)}')">#${esc(t)}</span>`).join('');

  const snoozeRow=rem?`<div class="snooze-row">
    <button class="snbtn" onclick="event.stopPropagation();snooze(${rem.id},10)">+10м</button>
    <button class="snbtn" onclick="event.stopPropagation();snooze(${rem.id},60)">+1ч</button>
    <button class="snbtn" onclick="event.stopPropagation();snooze(${rem.id},180)">+3ч</button>
    <button class="snbtn" onclick="event.stopPropagation();cancelRem(${rem.id})">🔇</button>
  </div>`:'';

  const expandHtml=exp?`<div class="cexpand">
    <textarea id="ed-${e.id}">${esc(e.content||e.title||'')}</textarea>
    <div class="mchips">
      ${['urgent','normal','someday'].map(p=>`<button class="mc ${e.priority===p?'on':''}" onclick="event.stopPropagation();patchInline(${e.id},'priority','${p}',this)">${p==='urgent'?'🔴 Срочно':p==='normal'?'🟡 Обычно':'⚪ Потом'}</button>`).join('')}
    </div>
    <div class="mchips">
      ${Object.keys(CAT).map(c=>`<button class="mc ${e.category===c?'on':''}" onclick="event.stopPropagation();patchInline(${e.id},'category','${c}',this)">${CAT[c].e}</button>`).join('')}
    </div>
    <div class="exp-actions">
      <button class="btn-sm btn-s" onclick="event.stopPropagation();delTask(${e.id})">🗑️</button>
      <button class="btn-sm btn-p" onclick="event.stopPropagation();saveContent(${e.id})">💾 Сохранить</button>
    </div>
  </div>`:'';

  return`<div class="card ${exp?'expanded':''}" id="c${e.id}" data-id="${e.id}">
    <div class="swipe-left-bg">✓ Готово</div>
    <div class="swipe-right-bg">🗑️</div>
    <div class="card-inner">
      <div class="dot ${e.priority}"></div>
      <div class="cbody" onclick="toggleExp(${e.id})">
        <div class="ctitle">${esc(e.title||e.content||'(без текста)')}</div>
        <div class="cmeta">${catB}${timeB}${recurB}${dueB}${ageB}${tagBs}</div>
        ${snoozeRow}
      </div>
      <div class="cactions">
        <button class="btn-i bi-check" onclick="event.stopPropagation();closeTask(${e.id})">✓</button>
        <button class="btn-i bi-edit"  onclick="event.stopPropagation();toggleExp(${e.id})">✎</button>
      </div>
    </div>
    ${expandHtml}
  </div>`;
}

function toggleExp(id){
  expandedId=expandedId===id?null:id;
  render();
  if(expandedId===id)setTimeout(()=>document.getElementById('ed-'+id)?.focus(),100);
}

// ── Swipe ─────────────────────────────────────────────────────────
function initSwipe(){
  document.querySelectorAll('.card').forEach(card=>{
    let sx=0,sy=0,dx=0,swiping=false;
    card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;swiping=false;},{passive:true});
    card.addEventListener('touchmove',e=>{
      dx=e.touches[0].clientX-sx;
      const dy=Math.abs(e.touches[0].clientY-sy);
      if(Math.abs(dx)>12&&Math.abs(dx)>dy){swiping=true;}
      if(!swiping)return;
      const inner=card.querySelector('.card-inner');
      if(!inner)return;
      inner.style.transform=`translateX(${dx}px)`;
      inner.style.transition='none';
      const lbg=card.querySelector('.swipe-left-bg'),rbg=card.querySelector('.swipe-right-bg');
      if(lbg)lbg.style.opacity=Math.max(0,Math.min(1,(dx-40)/60));
      if(rbg)rbg.style.opacity=Math.max(0,Math.min(1,(-dx-40)/60));
    },{passive:true});
    card.addEventListener('touchend',async()=>{
      const inner=card.querySelector('.card-inner');
      if(!inner)return;
      inner.style.transition='transform .2s';
      inner.style.transform='';
      const lbg=card.querySelector('.swipe-left-bg'),rbg=card.querySelector('.swipe-right-bg');
      if(lbg)lbg.style.opacity=0;if(rbg)rbg.style.opacity=0;
      const id=parseInt(card.dataset.id);
      if(dx>80)closeTask(id);
      else if(dx<-80)delTask(id,true);
    });
  });
}

// ── Actions ───────────────────────────────────────────────────────
async function closeTask(id){
  animOut(id);
  await api(`/api/close/${id}`,'POST');
  setTimeout(load,220);showToast('✅ Закрыто');
  tg?.HapticFeedback?.notificationOccurred('success');
}
async function delTask(id,noConfirm=false){
  if(!noConfirm&&!confirm('Удалить запись?'))return;
  animOut(id);
  await api(`/api/delete/${id}`,'POST');
  setTimeout(load,220);showToast('🗑️ Удалено');
}
async function patchInline(id,f,v,el){
  el.parentElement.querySelectorAll('.mc').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  await api(`/api/edit/${id}`,'POST',{[f]:v});
  const e=entries.find(x=>x.id===id);if(e)e[f]=v;
}
async function saveContent(id){
  const txt=document.getElementById('ed-'+id)?.value?.trim();
  if(!txt)return;
  await api(`/api/edit/${id}`,'POST',{content:txt,title:txt.slice(0,80)});
  showToast('💾 Сохранено');expandedId=null;load();
}
async function snooze(remId,mins){
  const r=await api(`/api/reminder/snooze/${remId}`,'POST',{minutes:mins});
  if(r?.ok){showToast(`😴 +${mins}м`);tg?.HapticFeedback?.impactOccurred('light');load();}
  else showToast('Не удалось',1);
}
async function cancelRem(remId){
  if(!confirm('Отменить напоминание?'))return;
  await api(`/api/reminder/cancel/${remId}`,'POST');
  showToast('🔇 Отменено');load();
}
function animOut(id){document.getElementById('c'+id)?.classList.add('removing');}

// ── Quick-add bar ─────────────────────────────────────────────────
function qaKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();qaSend();}}
async function qaSend(){
  const txt=document.getElementById('qa-inp').value.trim();
  if(!txt)return;
  const r=await api('/api/add','POST',{content:txt,category:'task',priority:'normal'});
  if(r?.ok){document.getElementById('qa-inp').value='';showToast('📋 Добавлено');tg?.HapticFeedback?.notificationOccurred('success');load();}
  else showToast('Ошибка',1);
}

// ── Stats tab ─────────────────────────────────────────────────────
async function loadStats(){
  document.getElementById('list').innerHTML='<div class="loading-wrap"><div class="spin"></div></div>';
  try{
    const[s,habits]=await Promise.all([api('/api/stats'),api('/api/entries?category=habit&status=open')]);
    if(tab==='stats'){renderStatsView(s,Array.isArray(habits)?habits:[]);}
  }catch(e){showToast('Ошибка',1);}
}
function renderStats(){loadStats();}

function renderStatsView(s,habits){
  const cat_icons={task:'📋',thought:'💭',idea:'💡',reminder:'⏰',note:'📝',habit:'🔁'};
  const total=s?.total||0,open=s?.open_tasks||0,done=s?.done_tasks||0;
  const rate=total>0?Math.round(done/total*100):0;
  const byC=s?.by_category||{};
  const maxC=Math.max(1,...Object.values(byC));
  const barColors={task:'#4c9bf7',reminder:'#ff9f0a',idea:'#bf5af2',thought:'#98a2b3',note:'#30d158',habit:'#bf5af2'};
  const barsHtml=Object.entries(byC).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([c,n])=>
    `<div class="sbar">
      <div class="sbar-lbl">${cat_icons[c]||'•'} ${c}</div>
      <div class="sbar-track"><div class="sbar-fill" style="width:${Math.round(n/maxC*100)}%;background:${barColors[c]||'#4c9bf7'}"></div></div>
      <div class="sbar-num">${n}</div>
    </div>`
  ).join('');

  const habitsHtml=habits.length?`<div class="habits-wrap">
    <div class="stat-bar-title">🔁 Привычки</div>
    ${habits.map(h=>`<div class="habit-row">
      <div class="habit-name">${esc(h.title||h.content||'')}</div>
      <button class="habit-btn" onclick="markHabit(${h.id})">✅ Отметить</button>
    </div>`).join('')}
  </div>`:'';

  document.getElementById('list').innerHTML=`<div class="stats-wrap">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="color:var(--link)">${total}</div><div class="stat-lbl">всего записей</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--orange)">${open}</div><div class="stat-lbl">открытых задач</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-lbl">закрыто задач</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--purple)">${rate}%</div><div class="stat-lbl">выполнено</div></div>
    </div>
    <div class="stat-bar-wrap">
      <div class="stat-bar-title">По категориям</div>
      ${barsHtml}
    </div>
    ${habitsHtml}
  </div>`;
}

async function markHabit(id){
  await api(`/api/close/${id}`,'POST');
  await api(`/api/edit/${id}`,'POST',{status:'open'});
  showToast('✅ Привычка отмечена!');tg?.HapticFeedback?.notificationOccurred('success');
  loadStats();
}

// ── Sheet ─────────────────────────────────────────────────────────
function openSheet(){
  document.getElementById('sheet').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  // Pre-fill from quick-add if has text
  const qa=document.getElementById('qa-inp').value.trim();
  if(qa){document.getElementById('sh-content').value=qa;document.getElementById('qa-inp').value='';}
  setTimeout(()=>document.getElementById('sh-content').focus(),350);
  tg?.HapticFeedback?.impactOccurred('light');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}
function selCat(c,el){
  shCat=c;
  document.querySelectorAll('#cat-grid .cat-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('time-block').style.display=(c==='reminder'||c==='habit')?'block':'none';
  document.getElementById('due-block').style.display=(c==='task')?'block':'none';
}
function selPri(p,el){
  shPri=p;
  document.querySelectorAll('.pri-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
function selTime(k,el){
  document.querySelectorAll('.tq').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  const dt=document.getElementById('sh-dt');const now=new Date();let t;
  if(k==='custom'){dt.style.display='block';shTime={kind:'custom'};return;}
  dt.style.display='none';
  if(typeof k==='number')t=new Date(Date.now()+k*60000);
  else if(k==='t9'){t=new Date();t.setHours(9,0,0,0);if(t<now)t.setDate(t.getDate()+1);}
  else if(k==='d9'){t=new Date();t.setDate(t.getDate()+1);t.setHours(9,0,0,0);}
  shTime={kind:k,iso:t.toISOString()};
}
function selDue(k,el){
  document.querySelectorAll('.dq').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  const di=document.getElementById('sh-due');const now=new Date();let d;
  if(k==='custom'){di.style.display='block';shDue={kind:'custom'};return;}
  di.style.display='none';
  if(k==='today')d=new Date();
  else if(k==='tomorrow'){d=new Date();d.setDate(d.getDate()+1);}
  else if(k==='week'){d=new Date();d.setDate(d.getDate()+7);}
  shDue={kind:k,iso:d.toISOString()};
}

async function saveEntry(){
  const content=document.getElementById('sh-content').value.trim();
  if(!content){document.getElementById('sh-content').focus();return;}
  const btn=document.getElementById('sh-save');btn.textContent='…';btn.disabled=true;
  const body={content,priority:shPri,category:shCat};
  if((shCat==='reminder'||shCat==='habit')&&shTime){
    if(shTime.kind==='custom'){const v=document.getElementById('sh-dt').value;if(v)body.remind_at=new Date(v).toISOString();}
    else if(shTime.iso)body.remind_at=shTime.iso;
  }
  if(shCat==='task'&&shDue){
    if(shDue.kind==='custom'){const v=document.getElementById('sh-due').value;if(v)body.due_date=new Date(v).toISOString();}
    else if(shDue.iso)body.due_date=shDue.iso;
  }
  try{
    const r=await api('/api/add','POST',body);
    if(r?.ok){document.getElementById('sh-content').value='';shTime=null;shDue=null;closeSheet();showToast(`${CAT[shCat].e} Добавлено`);load();}
    else showToast('Ошибка',1);
  }finally{btn.textContent='Сохранить';btn.disabled=false;}
}

// ── Utils ─────────────────────────────────────────────────────────
async function api(path,method='GET',body){
  const sep=path.includes('?')?'&':'?';
  const r=await fetch(`${BASE}${path}${sep}token=${TOKEN}`,{
    method,headers:body?{'Content-Type':'application/json'}:{},
    body:body?JSON.stringify(body):undefined,
  });
  return r.ok?r.json().catch(()=>null):null;
}
function showToast(msg,err=0){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function enc(s){return encodeURIComponent(s);}
function pad(n){return String(n).padStart(2,'0');}

// ── Init ──────────────────────────────────────────────────────────
renderTabs();load();
