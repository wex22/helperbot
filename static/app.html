<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WEX MIND</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #17212b;
  --card: #242f3d;
  --card2: #2b3a4a;
  --text: #ffffff;
  --sub: #8d9ba8;
  --urgent: #ff453a;
  --normal: #ffd60a;
  --someday: #48484a;
  --accent: #4c9bf7;
  --green: #30d158;
  --red: #ff453a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }

.header { padding: 20px 16px 12px; display: flex; align-items: center; justify-content: space-between; }
.header-left h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.header-left p { color: var(--sub); font-size: 13px; margin-top: 2px; }
.count { background: var(--accent); color: #fff; border-radius: 12px; padding: 3px 10px; font-size: 13px; font-weight: 600; }

.tabs { display: flex; padding: 0 16px 8px; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 7px 16px; border-radius: 20px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; background: var(--card); color: var(--sub); transition: all .15s; }
.tab.active { background: var(--accent); color: #fff; }

.section { padding: 4px 16px 100px; }
.section-title { font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 8px; font-weight: 600; }

.card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; transition: transform .2s ease, opacity .2s ease; }
.card.removing { transform: translateX(110%); opacity: 0; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.dot.urgent { background: var(--urgent); box-shadow: 0 0 8px rgba(255,69,58,.5); }
.dot.normal { background: var(--normal); }
.dot.someday { background: var(--someday); }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 15px; line-height: 1.35; word-break: break-word; }
.card-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.badge { padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 500; }
.badge-cat { background: rgba(76,155,247,.18); color: var(--accent); }
.badge-age { background: rgba(141,155,168,.12); color: var(--sub); }
.badge-done { background: rgba(48,209,88,.12); color: var(--green); }
.card-actions { display: flex; flex-direction: column; gap: 6px; }
.btn-icon { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: transform .1s; }
.btn-icon:active { transform: scale(.88); }
.btn-check { background: rgba(48,209,88,.18); color: var(--green); }
.btn-trash { background: rgba(255,69,58,.13); color: var(--red); }

.empty { text-align: center; padding: 60px 24px; }
.empty-icon { font-size: 52px; margin-bottom: 14px; }
.empty p { color: var(--sub); font-size: 16px; }

.fab { position: fixed; bottom: 28px; right: 20px; width: 58px; height: 58px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 30px; cursor: pointer; box-shadow: 0 6px 20px rgba(76,155,247,.45); display: flex; align-items: center; justify-content: center; z-index: 100; transition: transform .15s; }
.fab:active { transform: scale(.92); }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s; }
.overlay.show { opacity: 1; pointer-events: all; }

.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 22px 22px 0 0; padding: 12px 16px 40px; z-index: 300; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); }
.sheet.show { transform: translateY(0); }
.handle { width: 38px; height: 4px; background: var(--sub); border-radius: 2px; margin: 0 auto 18px; opacity: .5; }
.sheet h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.field { width: 100%; background: var(--bg); border: none; border-radius: 12px; padding: 13px 14px; color: var(--text); font-size: 15px; outline: none; font-family: inherit; margin-bottom: 10px; }
textarea.field { min-height: 90px; resize: none; }
.row { display: flex; gap: 8px; margin-bottom: 14px; }
.row select.field { margin-bottom: 0; }
.btn-add { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn-add:active { opacity: .8; }

.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-wrap { display: flex; justify-content: center; padding: 60px; }

.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px); background: rgba(48,209,88,.9); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 999; transition: transform .3s; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: rgba(255,69,58,.9); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>WEX MIND</h1>
    <p id="subtitle">Загрузка...</p>
  </div>
  <div class="count" id="count">...</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('all',this)">Все</button>
  <button class="tab" onclick="setTab('urgent',this)">🔴 Срочные</button>
  <button class="tab" onclick="setTab('normal',this)">🟡 Обычные</button>
  <button class="tab" onclick="setTab('someday',this)">⚪ Потом</button>
</div>

<div class="section" id="list"></div>

<button class="fab" onclick="openSheet()">+</button>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <h3>Новая задача</h3>
  <textarea class="field" id="inp-content" placeholder="Что нужно сделать?"></textarea>
  <div class="row">
    <select class="field" id="inp-priority">
      <option value="normal">🟡 Обычная</option>
      <option value="urgent">🔴 Срочная</option>
      <option value="someday">⚪ Когда-нибудь</option>
    </select>
  </div>
  <button class="btn-add" id="btn-add" onclick="addTask()">Добавить</button>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = '__TOKEN__';
const BASE  = '__BASE_URL__';
const CAT_ICON = {task:'📋',thought:'💭',idea:'💡',reminder:'⏰',note:'📝'};
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let tasks = [], filter = 'all';

async function load() {
  document.getElementById('list').innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  try {
    const r = await fetch(`${BASE}/api/tasks?token=${TOKEN}`);
    tasks = await r.json();
    render();
  } catch { showToast('Ошибка загрузки', true); }
}

function setTab(f, el) {
  filter = f;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('list');
  const filtered = filter === 'all' ? tasks : tasks.filter(t => t.priority === filter);

  document.getElementById('count').textContent = tasks.length;
  document.getElementById('subtitle').textContent =
    tasks.length === 0 ? 'Нет задач' : `${tasks.length} ${plural(tasks.length,'задача','задачи','задач')}`;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">${filter==='urgent'?'🎉':'📋'}</div><p>${filter==='urgent'?'Срочных задач нет!':'Задач нет — добавь первую'}</p></div>`;
    return;
  }

  // Group by priority
  const groups = filter === 'all'
    ? [['urgent','🔴 Срочные'], ['normal','🟡 Обычные'], ['someday','⚪ Когда-нибудь']]
    : [[filter, '']];

  list.innerHTML = groups.map(([pri, label]) => {
    const items = filtered.filter(t => t.priority === pri);
    if (!items.length) return '';
    const cards = items.map(t => {
      const days = t.created_at ? Math.floor((Date.now() - new Date(t.created_at)) / 86400000) : 0;
      const age = days > 1 ? `${days}д` : days === 1 ? 'вчера' : 'сегодня';
      return `<div class="card" id="c${t.id}">
        <div class="dot ${t.priority}"></div>
        <div class="card-body">
          <div class="card-title">${esc(t.title)}</div>
          <div class="card-meta">
            <span class="badge badge-cat">${CAT_ICON[t.category]||''} ${t.category}</span>
            <span class="badge badge-age">${age}</span>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-icon btn-check" onclick="closeTask(${t.id})">✓</button>
          <button class="btn-icon btn-trash" onclick="delTask(${t.id})">✕</button>
        </div>
      </div>`;
    }).join('');
    return label ? `<div class="section-title">${label}</div>${cards}` : cards;
  }).join('');
}

async function closeTask(id) {
  animateOut(id);
  await fetch(`${BASE}/api/close/${id}?token=${TOKEN}`, {method:'POST'});
  tasks = tasks.filter(t => t.id !== id);
  setTimeout(render, 220);
  showToast('✅ Задача закрыта');
  tg?.HapticFeedback?.notificationOccurred('success');
}

async function delTask(id) {
  if (!confirm('Удалить задачу?')) return;
  animateOut(id);
  await fetch(`${BASE}/api/delete/${id}?token=${TOKEN}`, {method:'POST'});
  tasks = tasks.filter(t => t.id !== id);
  setTimeout(render, 220);
  showToast('Удалено');
}

function animateOut(id) {
  document.getElementById('c'+id)?.classList.add('removing');
}

function openSheet() {
  document.getElementById('sheet').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('inp-content').focus(), 350);
  tg?.HapticFeedback?.impactOccurred('light');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

async function addTask() {
  const content = document.getElementById('inp-content').value.trim();
  if (!content) { document.getElementById('inp-content').focus(); return; }
  const priority = document.getElementById('inp-priority').value;
  const btn = document.getElementById('btn-add');
  btn.textContent = '...'; btn.disabled = true;
  try {
    await fetch(`${BASE}/api/add?token=${TOKEN}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({content, priority})
    });
    document.getElementById('inp-content').value = '';
    closeSheet();
    showToast('📋 Задача добавлена');
    await load();
  } finally { btn.textContent = 'Добавить'; btn.disabled = false; }
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err?' error':'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function plural(n, a, b, c) {
  const m = Math.abs(n) % 100, m1 = m % 10;
  if (m > 10 && m < 20) return c;
  if (m1 > 1 && m1 < 5) return b;
  if (m1 === 1) return a;
  return c;
}

load();
</script>
</body>
</html>
